<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace - Ascenda Groups</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
    .market-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; cursor: pointer; transition: all 0.3s ease; }
    .market-card:hover { border-color: var(--green); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 30px rgba(16,185,129,0.1); }
    .market-thumb { width: 100%; height: 200px; object-fit: cover; background: var(--bg-secondary); position: relative; }
    .market-thumb .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 2.5rem; opacity: 0.8; }
    .market-body { padding: 20px; }
    .market-body h3 { font-size: 1.1rem; margin-bottom: 4px; }
    .market-price { font-size: 1.3rem; font-weight: 700; color: var(--green); margin: 8px 0; }
    .market-contact { color: var(--text-muted); font-size: 0.8rem; margin-top: 8px; }
    .filter-section { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 32px; }
    .filter-section button { padding: 10px 20px; border-radius: 50px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border); background: transparent; color: var(--text-secondary); transition: all 0.2s; }
    .filter-section button:hover { border-color: var(--green); color: var(--green); }
    .filter-section button.active { background: var(--gradient-green); color: white; border-color: transparent; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.active { display: flex; }
    .modal-content { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 30px; position: relative; }
    .modal-close { position: absolute; top: 12px; right: 12px; background: var(--bg-hover); border: none; color: white; font-size: 1.2rem; cursor: pointer; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .modal-close:hover { background: var(--red); }
    .modal-image { width: 100%; border-radius: 12px; margin-bottom: 16px; }
    .youtube-embed { width: 100%; aspect-ratio: 16/9; border-radius: 12px; margin-bottom: 16px; border: none; }
    .skeleton { height: 300px; background: linear-gradient(90deg, var(--bg-card) 25%, var(--border) 50%, var(--bg-card) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 16px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>
<nav class="navbar"><div class="nav-container">
  <a href="index.html" class="logo"><img src="https://rfogomnbicceentrhymy.supabase.co/storage/v1/object/public/Ascenda%20pics/logo.png" alt="Ascenda"></a>
  <div class="nav-links">
    <a href="index.html">Home</a><a href="about.html">About</a><a href="services.html">Services</a><a href="marketplace.html" class="active">Marketplace</a><a href="jobs.html">Jobs</a><a href="news.html">News</a><a href="contact.html">Contact</a>
    <a href="login.html" class="btn btn-outline auth-login-btn">Login</a><a href="register.html" class="btn btn-primary auth-register-btn">Sign Up</a>
    <span class="auth-user-name" style="display:none;color:var(--blue);font-weight:600;"></span>
    <a href="#" class="btn btn-outline auth-logout-btn" style="display:none;">Logout</a>
  </div>
  <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
</div></nav>
<div class="mobile-nav" id="mobileNav">
  <a href="index.html">Home</a><a href="about.html">About</a><a href="services.html">Services</a><a href="marketplace.html">Marketplace</a><a href="jobs.html">Jobs</a><a href="news.html">News</a><a href="contact.html">Contact</a><a href="login.html">Login</a><a href="register.html">Sign Up</a>
</div>

<section class="section"><div class="container">
  <div class="section-header">
    <span class="section-badge">Buy & Sell</span>
    <h2>Marketplace</h2>
    <p>Houses, cars, valuables, e-services & digital products</p>
  </div>

  <div class="filter-section">
    <button class="active" data-filter="all">All</button>
    <button data-filter="house">🏠 Houses</button>
    <button data-filter="car">🚗 Cars</button>
    <button data-filter="value_item">💎 Valuables</button>
    <button data-filter="e_service">🔧 E-Services</button>
    <button data-filter="digital_product">📱 Digital</button>
    <button data-filter="other">📦 Other</button>
  </div>

  <div id="market-container" class="market-grid">
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
  </div>
</div></section>

<div class="modal-overlay" id="market-modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<footer class="footer"><div class="footer-content">
  <div class="footer-links"><a href="index.html">Home</a><a href="about.html">About</a><a href="services.html">Services</a><a href="contact.html">Contact</a></div>
  <p>© 2026 Ascenda Groups. CEO: Eyakem Takele Kebede</p>
  <p><a href="https://t.me/ascendagroups" target="_blank">Telegram</a></p>
</div></footer>

<script src="supabase.js"></script>
<script>
if(!window.supabaseClient) window.supabaseClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY, {auth:{persistSession:true,autoRefreshToken:true,storage:localStorage}});
const sb = window.supabaseClient;
let allItems = [];

document.addEventListener('DOMContentLoaded', ()=>{ loadMarketplace(); setupFilters(); });

function getYouTubeID(url) {
  if(!url) return null;
  const m = url.match(/(?:youtu\.be\/|v\/|embed\/|watch\?v=|&v=)([^#&?]{11})/);
  return m ? m[1] : null;
}

async function loadMarketplace() {
  const {data} = await sb.from('marketplace_items').select('*').eq('is_active',true).order('created_at',{ascending:false});
  allItems = data || [];
  renderItems(allItems);
}

function renderItems(items) {
  const c = document.getElementById('market-container');
  if(!items.length) { c.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-muted);"><h3>No items yet</h3></div>'; return; }
  c.innerHTML = items.map(item=>{
    const ytID = getYouTubeID(item.images?.[0]);
    const thumb = ytID ? `https://img.youtube.com/vi/${ytID}/hqdefault.jpg` : (item.images?.[0] || null);
    return `<div class="market-card" onclick="openDetail('${item.id}')">
      <div class="market-thumb" style="${thumb?`background-image:url(${thumb});background-size:cover;background-position:center;`:''}">
        ${ytID?'<div class="play-icon">▶️</div>':''}
        ${!thumb?`<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:3rem;">🏷️</div>`:''}
      </div>
      <div class="market-body">
        <span class="badge badge-green">${item.category}</span>
        <h3>${item.title}</h3>
        <div class="market-price">$${item.price}</div>
        <p style="color:var(--text-secondary);font-size:0.85rem;">${(item.description||'').substring(0,100)}</p>
        <div class="market-contact">📞 ${item.seller_contact||'Contact for details'}</div>
      </div></div>`;
  }).join('');
}

function setupFilters() {
  document.querySelectorAll('.filter-section button').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.filter-section button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const f = btn.dataset.filter;
      renderItems(f==='all'?allItems:allItems.filter(i=>i.category===f));
    });
  });
}

function openDetail(id) {
  const item = allItems.find(i=>i.id===id);
  if(!item) return;
  const body = document.getElementById('modal-body');
  const ytID = getYouTubeID(item.images?.[0]);
  let media = '';
  if(ytID) media = `<iframe class="youtube-embed" src="https://www.youtube.com/embed/${ytID}" frameborder="0" allowfullscreen></iframe>`;
  else if(item.images?.[0]) media = `<img src="${item.images[0]}" class="modal-image" alt="${item.title}">`;
  body.innerHTML = `${media}<span class="badge badge-green">${item.category}</span><h2>${item.title}</h2><div class="market-price">$${item.price}</div><p style="color:var(--text-secondary);line-height:1.8;">${item.description||''}</p><p style="margin-top:12px;"><strong>📞 Contact:</strong> ${item.seller_contact||'N/A'}</p>`;
  document.getElementById('market-modal').classList.add('active');
  document.body.style.overflow='hidden';
}

function closeModal() {
  document.getElementById('market-modal').classList.remove('active');
  document.body.style.overflow='';
}
document.getElementById('market-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
</script>
</body>
</html>
