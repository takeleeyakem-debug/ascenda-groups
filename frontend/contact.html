<section class="section"><div class="container" style="max-width:600px;"><div class="section-header"><h2>Contact Us</h2></div>
<div class="form-container"><form id="contact-form" onsubmit="return false;">
<div class="form-group"><label>Name *</label><input type="text" id="c-name" required></div>
<div class="form-group"><label>Email *</label><input type="email" id="c-email" required></div>
<div class="form-group"><label>Subject</label><input type="text" id="c-subject"></div>
<div class="form-group"><label>Message *</label><textarea id="c-message" required></textarea></div>
<button class="btn btn-primary btn-block btn-lg" onclick="sendMessage()">Send Message ✉️</button>
</form><p id="form-msg" style="text-align:center;margin-top:12px;display:none;"></p></div>
<div class="card" style="text-align:center;margin-top:20px;"><h3>🏦 Payment Info</h3><p>Dashen Bank</p><p>Account: 5444991978011</p><p>Eyakem Takele Kebede</p></div></div></section>

<footer class="footer"><div class="footer-content"><p>© 2026 Ascenda Groups</p></div></footer>
<script src="supabase.js"></script><script src="script.js"></script>
<script>
async function sendMessage(){
  const n=document.getElementById('c-name').value,e=document.getElementById('c-email').value,s=document.getElementById('c-subject').value,m=document.getElementById('c-message').value;
  const msg=document.getElementById('form-msg');
  if(!n||!e||!m){msg.textContent='Fill all required fields';msg.style.display='block';msg.style.color='#ef4444';return;}
  if(!window.supabaseClient)window.supabaseClient=window.supabase.createClient(window.SUPABASE_URL,window.SUPABASE_ANON_KEY);
  const{error}=await window.supabaseClient.from('contact_messages').insert({name:n,email:e,subject:s,message:m});
  if(error){msg.textContent='Error: '+error.message;msg.style.display='block';msg.style.color='#ef4444';}
  else{msg.textContent='✅ Message sent!';msg.style.display='block';msg.style.color='#10b981';document.getElementById('contact-form').reset();}
}
</script>
</body></html>
