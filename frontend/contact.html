<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Contact - Ascenda Groups</title><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body>
<!-- INSERT UNIVERSAL NAVBAR HERE -->
<div class="container" style="max-width:600px;margin:40px auto;">
  <h2>Contact Us</h2>
  <form id="contact-form" onsubmit="return false;">
    <input type="text" id="c-name" placeholder="Name" required>
    <input type="email" id="c-email" placeholder="Email" required>
    <input type="text" id="c-subject" placeholder="Subject">
    <textarea id="c-message" placeholder="Message" rows="4" required></textarea>
    <button class="btn btn-primary btn-block" onclick="sendContact()">Send Message</button>
    <p id="form-msg" style="text-align:center;margin-top:10px;display:none;"></p>
  </form>
  <div class="card" style="margin-top:20px;text-align:center;">
    <h3>Payment Info</h3><p>Dashen Bank</p><p>Account: 5444991978011</p><p>Eyakem Takele Kebede</p>
  </div>
</div>
<footer class="footer"><p>© 2026 Ascenda Groups</p></footer>
<script src="supabase.js"></script>
<script>
async function sendContact() {
  const n=document.getElementById('c-name').value, e=document.getElementById('c-email').value, s=document.getElementById('c-subject').value, m=document.getElementById('c-message').value;
  const msg=document.getElementById('form-msg');
  if(!n||!e||!m) { msg.textContent='Fill required fields'; msg.style.display='block'; msg.style.color='#ef4444'; return; }
  const sb = window.supabaseClient || window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  const {error} = await sb.from('contact_messages').insert({name:n,email:e,subject:s,message:m});
  if(error) { msg.textContent='Error: '+error.message; msg.style.display='block'; msg.style.color='#ef4444'; }
  else { msg.textContent='✅ Message sent!'; msg.style.display='block'; msg.style.color='#10b981'; document.getElementById('contact-form').reset(); }
}
</script>
</body></html>
