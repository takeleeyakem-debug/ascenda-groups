<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – Ascenda Groups</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Universal Navbar -->
  <nav class="navbar">...</nav>
  <div class="mobile-nav" id="mobileNav">...</div>

  <div class="container" style="max-width:600px;margin:40px auto;padding:0 20px;">
    <!-- Contact Form -->
    <h2>Contact Us</h2>
    <form id="contact-form" onsubmit="return false;">
      <div class="form-group"><label>Name *</label><input type="text" name="name" required></div>
      <div class="form-group"><label>Email *</label><input type="email" name="email" required></div>
      <div class="form-group"><label>Subject</label><input type="text" name="subject"></div>
      <div class="form-group"><label>Message *</label><textarea name="message" rows="4" required></textarea></div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Send Message ✉️</button>
      <p id="form-msg" style="text-align:center;margin-top:12px;display:none;"></p>
    </form>

    <!-- Application Form (e.g. for jobs/agent) -->
    <h2 style="margin-top:40px;">Apply for a Position</h2>
    <form id="apply-form" onsubmit="return false;">
      <div class="form-group"><label>Full Name *</label><input type="text" id="app-name" required></div>
      <div class="form-group"><label>Email *</label><input type="email" id="app-email" required></div>
      <div class="form-group"><label>Position Type</label><select id="app-type">
        <option value="agent">Agent</option>
        <option value="worker">Worker</option>
        <option value="dept_admin">Department Admin</option>
        <option value="job_poster">Job Poster</option>
        <option value="marketplace_poster">Marketplace Poster</option>
      </select></div>
      <div class="form-group"><label>Message</label><textarea id="app-message" rows="3" placeholder="Why do you want to join?"></textarea></div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Submit Application</button>
      <p id="apply-msg" style="text-align:center;margin-top:12px;display:none;"></p>
    </form>

    <!-- Payment Info -->
    <div class="card" style="margin-top:30px;text-align:center;">
      <h3>🏦 Payment Information</h3>
      <p>Dashen Bank</p>
      <p>Account: <strong>5444991978011</strong></p>
      <p>Name: <strong>Eyakem Takele Kebede</strong></p>
    </div>
  </div>

  <footer class="footer">
    <p>© <span data-setting="copyright_year">2026</span> Ascenda Groups. CEO: <span data-setting="ceo_name">Eyakem Takele Kebede</span></p>
    <p><a href="https://t.me/ascendagroups" target="_blank">Telegram</a></p>
  </footer>

  <script src="supabase.js"></script>
  <script>
    // Contact form handler
    document.getElementById('contact-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const btn = form.querySelector('button');
      const msg = document.getElementById('form-msg');
      btn.disabled = true; btn.textContent = 'Sending...';
      const sb = window.supabaseClient || supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
      const { error } = await sb.from('contact_messages').insert({
        name: form.name.value, email: form.email.value,
        subject: form.subject.value, message: form.message.value
      });
      btn.disabled = false; btn.textContent = 'Send Message ✉️';
      if (error) { msg.textContent = 'Error: ' + error.message; msg.style.color = 'red'; msg.style.display = 'block'; }
      else { msg.textContent = '✅ Message sent!'; msg.style.color = '#10b981'; msg.style.display = 'block'; form.reset(); }
    });

    // Application form handler
    document.getElementById('apply-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const msg = document.getElementById('apply-msg');
      const name = document.getElementById('app-name').value.trim();
      const email = document.getElementById('app-email').value.trim();
      const type = document.getElementById('app-type').value;
      const message = document.getElementById('app-message').value.trim();
      if (!name || !email) { msg.textContent = 'Name and email required'; msg.style.color = 'red'; msg.style.display = 'block'; return; }
      btn.disabled = true; btn.textContent = 'Submitting...';
      const sb = window.supabaseClient || supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
      // First, ensure a profile exists or use existing user?
      // Since this is a public application, we'll insert into 'applications' table directly
      const { error } = await sb.from('applications').insert({
        applicant_id: null, // can be null for external applicants
        type: type,
        message: message,
        status: 'pending'
      });
      btn.disabled = false; btn.textContent = 'Submit Application';
      if (error) { msg.textContent = 'Error: ' + error.message; msg.style.color = 'red'; msg.style.display = 'block'; }
      else { msg.textContent = '✅ Application submitted!'; msg.style.color = '#10b981'; msg.style.display = 'block'; e.target.reset(); }
    });
  </script>
  <script src="script.js"></script>
</body>
</html>
