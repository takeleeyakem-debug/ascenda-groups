<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel – Ascenda Groups</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --bg:#0b1120; --card:#1a2332; --border:#2d3a4f; --text:#e2e8f0; --muted:#94a3b8; --blue:#3b82f6; --red:#ef4444; --green:#10b981; --gold:#f59e0b; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family: system-ui, sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh; }
    .sidebar { width:260px; background:var(--card); border-right:1px solid var(--border); padding:20px; position:fixed; top:0; left:0; bottom:0; overflow-y:auto; z-index:10; }
    .sidebar h3 { color:var(--gold); margin-bottom:16px; font-size:0.9rem; }
    .sidebar a { display:flex; align-items:center; gap:8px; padding:10px 14px; border-radius:10px; color:var(--muted); text-decoration:none; font-size:0.9rem; margin-bottom:2px; cursor:pointer; }
    .sidebar a:hover, .sidebar a.active { background:rgba(59,130,246,0.1); color:var(--blue); }
    .main { margin-left:260px; flex:1; padding:30px; }
    .tab { display:none; }
    .tab.active { display:block; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px; margin-bottom:20px; }
    .card h3 { margin-bottom:16px; }
    .form-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
    .form-group { flex:1; min-width:180px; margin-bottom:8px; }
    .form-group label { display:block; font-size:0.75rem; color:var(--muted); margin-bottom:4px; text-transform:uppercase; }
    input, select, textarea { width:100%; padding:10px; background:var(--bg); border:1px solid var(--border); color:white; border-radius:8px; font-family:inherit; }
    textarea { resize:vertical; min-height:70px; }
    button { padding:10px 20px; border-radius:8px; font-weight:600; cursor:pointer; border:none; }
    .btn-primary { background:var(--blue); color:white; }
    .btn-danger { background:var(--red); color:white; }
    .btn-success { background:var(--green); color:white; }
    .btn-sm { padding:4px 10px; font-size:0.75rem; }
    table { width:100%; border-collapse:collapse; margin-top:12px; }
    th { text-align:left; padding:8px 10px; color:var(--muted); font-size:0.7rem; text-transform:uppercase; border-bottom:2px solid var(--border); }
    td { padding:8px 10px; border-bottom:1px solid var(--border); font-size:0.9rem; }
    .toast { position:fixed; top:20px; right:20px; background:var(--card); border:1px solid var(--green); padding:12px 20px; border-radius:12px; z-index:999; font-size:0.9rem; }
    .toast.error { border-color:var(--red); }
    @media (max-width:768px) {
      .sidebar { display:none; }
      .main { margin-left:0; }
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div style="margin-bottom:20px;">
    <img src="https://rfogomnbicceentrhymy.supabase.co/storage/v1/object/public/Ascenda%20pics/logo.png" style="height:30px;">
  </div>
  <h3>ADMIN PANEL</h3>
  <a class="active" onclick="switchTab('users')">👥 Users</a>
  <a onclick="switchTab('departments')">🏢 Departments</a>
  <a onclick="switchTab('authority')">⭐ Authority</a>
  <a onclick="switchTab('jobs')">💼 Jobs</a>
  <a onclick="switchTab('services')">🔧 Services</a>
  <a onclick="switchTab('marketplace')">🏪 Marketplace</a>
  <a onclick="switchTab('news')">📰 News</a>
  <a onclick="switchTab('announcements')">📢 Announcements</a>
  <a onclick="switchTab('applications')">📋 Applications</a>
  <a onclick="switchTab('messages')">✉️ Messages</a>
  <a onclick="switchTab('settings')">⚙️ Settings</a>
  <a href="index.html" style="margin-top:20px;">🏠 Back to Site</a>
  <a onclick="logout()" style="color:var(--red);">🚪 Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="main" id="main-content">
  <!-- Content loaded dynamically -->
</div>

<script src="supabase.js"></script>
<script>
// ========== SUPABASE INIT ==========
const sb = window.supabaseClient || supabase.createClient(
  'https://rfogomnbicceentrhymy.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmb2dvbW5iaWNjZWVudHJoeW15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDQwOTEsImV4cCI6MjA5NTgyMDA5MX0.wke5a7GEdU2oepfKfSD-rthLTEmpk3GqVfFRM_MjZ9c',
  { auth: { persistSession: true, autoRefreshToken: true, storage: localStorage } }
);

let adminUser = null;

// ========== AUTH CHECK ==========
async function init() {
  const { data: { user }, error } = await sb.auth.getUser();
  if (error || !user) { window.location.href = 'login.html'; return; }
  adminUser = user;
  
  // Check if admin
  if (user.email === 'takeleeyakem@gmail.com') {
    console.log('✅ CEO Access Granted');
    switchTab('users');
    return;
  }
  
  const { data: profile } = await sb.from('profiles').select('role').eq('id', user.id).single();
  if (profile?.role === 'admin' || profile?.role === 'ceo') {
    console.log('✅ Admin Access Granted');
    switchTab('users');
    return;
  }
  
  window.location.href = 'index.html';
}

// ========== LOGOUT ==========
async function logout() {
  await sb.auth.signOut();
  window.location.href = 'landing.html';
}

// ========== TOAST ==========
function showToast(msg, isError) {
  const t = document.createElement('div');
  t.className = 'toast' + (isError ? ' error' : '');
  t.textContent = (isError ? '❌ ' : '✅ ') + msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ========== TAB SWITCHING ==========
async function switchTab(tabName) {
  // Update sidebar
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  const link = Array.from(document.querySelectorAll('.sidebar a')).find(a => a.textContent.toLowerCase().includes(tabName));
  if (link) link.classList.add('active');
  
  // Load content
  await loadTabContent(tabName);
}

async function loadTabContent(tabName) {
  const main = document.getElementById('main-content');
  main.innerHTML = '<p style="color:var(--muted);">Loading...</p>';
  
  let html = '';
  
  if (tabName === 'users') {
    const { data: users } = await sb.from('profiles').select('*');
    html = `<div class="card"><h3>👥 All Users (${users?.length || 0})</h3>
      <table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Actions</th></tr></thead><tbody>
      ${(users||[]).map(u => `
        <tr><td>${u.full_name||'-'}</td><td>${u.email||'-'}</td><td>${u.role||'user'}</td>
        <td><select onchange="updateRole('${u.id}',this.value)" style="padding:4px 8px;background:var(--bg);color:white;border:1px solid var(--border);border-radius:6px;">
          <option ${u.role==='user'?'selected':''}>user</option>
          <option ${u.role==='agent'?'selected':''}>agent</option>
          <option ${u.role==='worker'?'selected':''}>worker</option>
          <option ${u.role==='dept_admin'?'selected':''}>dept_admin</option>
          <option ${u.role==='admin'?'selected':''}>admin</option>
        </select> <button class="btn-danger btn-sm" onclick="deleteUser('${u.id}')">Del</button></td></tr>
      `).join('')}</tbody></table></div>`;
  }
  
  else if (tabName === 'departments') {
    const { data: depts } = await sb.from('departments').select('*');
    html = `<div class="card"><h3>➕ Create Department</h3>
      <div class="form-row"><div class="form-group"><label>Name</label><input id="dept-name"></div><div class="form-group"><label>Description</label><input id="dept-desc"></div></div>
      <button class="btn-primary" onclick="addDepartment()">Create Department</button></div>
      <div class="card"><h3>🏢 Departments</h3><table><thead><tr><th>Name</th><th>Description</th><th>Actions</th></tr></thead><tbody>
      ${(depts||[]).map(d => `<tr><td>${d.name}</td><td>${d.description||''}</td><td><button class="btn-danger btn-sm" onclick="deleteItem('departments','${d.id}')">Del</button></td></tr>`).join('')}</tbody></table></div>`;
  }
  
  else if (tabName === 'authority') {
    const { data: auth } = await sb.from('authority').select('*, profiles(full_name), departments(name)').order('level');
    const { data: users } = await sb.from('profiles').select('id,full_name');
    const { data: depts } = await sb.from('departments').select('id,name');
    html = `<div class="card"><h3>⭐ Assign Authority</h3>
      <div class="form-row"><div class="form-group"><label>Title</label><input id="auth-title"></div><div class="form-group"><label>Level</label><input id="auth-level" type="number"></div></div>
      <div class="form-row"><div class="form-group"><label>User</label><select id="auth-user"><option value="">Select</option>${(users||[]).map(u=>`<option value="${u.id}">${u.full_name||u.id}</option>`).join('')}</select></div>
      <div class="form-group"><label>Department</label><select id="auth-dept"><option value="">Select</option>${(depts||[]).map(d=>`<option value="${d.id}">${d.name}</option>`).join('')}</select></div></div>
      <button class="btn-primary" onclick="addAuthority()">Assign</button></div>
      <div class="card"><h3>Authority Ladder</h3><table><thead><tr><th>Title</th><th>Level</th><th>User</th><th>Dept</th><th>Actions</th></tr></thead><tbody>
      ${(auth||[]).map(a => `<tr><td>${a.title}</td><td>${a.level}</td><td>${a.profiles?.full_name||'-'}</td><td>${a.departments?.name||'-'}</td><td><button class="btn-danger btn-sm" onclick="deleteItem('authority','${a.id}')">Del</button></td></tr>`).join('')}</tbody></table></div>`;
  }
  
  else if (tabName === 'jobs') {
    const { data: jobs } = await sb.from('jobs').select('*, departments(name)').order('created_at',{ascending:false});
    const { data: depts } = await sb.from('departments').select('id,name');
    html = `<div class="card"><h3>💼 Post New Job</h3>
      <div class="form-row"><div class="form-group"><label>Title</label><input id="job-title"></div><div class="form-group"><label>Department</label><select id="job-dept"><option value="">Select</option>${(depts||[]).map(d=>`<option value="${d.id}">${d.name}</option>`).join('')}</select></div></div>
      <div class="form-row"><div class="form-group"><label>Location</label><input id="job-loc"></div><div class="form-group"><label>Type</label><input id="job-type"></div><div class="form-group"><label>Salary</label><input id="job-salary"></div></div>
      <div class="form-group"><label>Description</label><textarea id="job-desc" rows="3"></textarea></div>
      <button class="btn-primary" onclick="addJob()">Post Job</button></div>
      <div class="card"><h3>Posted Jobs</h3><table><thead><tr><th>Title</th><th>Location</th><th>Dept</th><th>Actions</th></tr></thead><tbody>
      ${(jobs||[]).map(j => `<tr><td>${j.title}</td><td>${j.location||'-'}</td><td>${j.departments?.name||'-'}</td><td><button class="btn-danger btn-sm" onclick="deleteItem('jobs','${j.id}')">Del</button></td></tr>`).join('')}</tbody></table></div>`;
  }
  
  else if (tabName === 'services') {
    const { data: svcs } = await sb.from('services').select('*, departments(name)').order('created_at',{ascending:false});
    const { data: depts } = await sb.from('departments').select('id,name');
    html = `<div class="card"><h3>🔧 Add Service</h3>
      <div class="form-row"><div class="form-group"><label>Title</label><input id="svc-title"></div><div class="form-group"><label>Price</label><input id="svc-price"></div></div>
      <div class="form-group"><label>Department</label><select id="svc-dept"><option value="">Select</option>${(depts||[]).map(d=>`<option value="${d.id}">${d.name}</option>`).join('')}</select></div>
      <div class="form-group"><label>Description</label><textarea id="svc-desc" rows="3"></textarea></div>
      <button class="btn-primary" onclick="addService()">Add Service</button></div>
      <div class="card"><h3>Services</h3><table><thead><tr><th>Title</th><th>Price</th><th>Dept</th><th>Status</th><th>Actions</th></tr></thead><tbody>
      ${(svcs||[]).map(s => `<tr><td>${s.title}</td><td>${s.price||'-'}</td><td>${s.departments?.name||'-'}</td><td>${s.is_active?'✅':'❌'}</td><td><button class="btn-success btn-sm" onclick="toggleService('${s.id}',${!s.is_active})">Toggle</button> <button class="btn-danger btn-sm" onclick="deleteItem('services','${s.id}')">Del</button></td></tr>`).join('')}</tbody></table></div>`;
  }
  
  else if (tabName === 'marketplace') {
    const { data: items } = await sb.from('marketplace_items').select('*').order('created_at',{ascending:false});
    html = `<div class="card"><h3>🏪 Add Marketplace Item</h3>
      <div class="form-row"><div class="form-group"><label>Title</label><input id="mp-title"></div><div class="form-group"><label>Category</label><select id="mp-cat"><option>house</option><option>car</option><option>value_item</option><option>e_service</option><option>digital_product</option><option>other</option></select></div></div>
      <div class="form-row"><div class="form-group"><label>Price</label><input id="mp-price" type="number" step="0.01"></div><div class="form-group"><label>Contact</label><input id="mp-contact"></div></div>
      <div class="form-group"><label>Image URL</label><input id="mp-image"></div>
      <div class="form-group"><label>Description</label><textarea id="mp-desc" rows="3"></textarea></div>
      <button class="btn-primary" onclick="addMarketplaceItem()">Add Item</button></div>
      <div class="card"><h3>Items</h3><table><thead><tr><th>Title</th><th>Category</th><th>Price</th><th>Actions</th></tr></thead><tbody>
      ${(items||[]).map(i => `<tr><td>${i.title}</td><td>${i.category}</td><td>$${i.price}</td><td><button class="btn-danger btn-sm" onclick="deleteItem('marketplace_items','${i.id}')">Del</button></td></tr>`).join('')}</tbody></table></div>`;
  }
  
  else if (tabName === 'news') {
    const { data: news } = await sb.from('news_posts').select('*').order('created_at',{ascending:false});
    html = `<div class="card"><h3>📰 Publish News</h3>
      <div class="form-row"><div class="form-group"><label>Title</label><input id="news-title"></div><div class="form-group"><label>Type</label><select id="news-type"><option>article</option><option>youtube</option><option>image</option><option>document</option></select></div></div>
      <div class="form-group"><label>Media URL</label><input id="news-media"></div>
      <div class="form-group"><label>Content</label><textarea id="news-content" rows="3"></textarea></div>
      <button class="btn-primary" onclick="addNews()">Publish</button></div>
      <div class="card"><h3>News</h3><table><thead><tr><th>Title</th><th>Type</th><th>Date</th><th>Actions</th></tr></thead><tbody>
      ${(news||[]).map(n => `<tr><td>${n.title}</td><td>${n.type}</td><td>${new Date(n.created_at).toLocaleDateString()}</td><td><button class="btn-danger btn-sm" onclick="deleteItem('news_posts','${n.id}')">Del</button></td></tr>`).join('')}</tbody></table></div>`;
  }
  
  else if (tabName === 'announcements') {
    const { data: anns } = await sb.from('announcements').select('*').order('created_at',{ascending:false});
    html = `<div class="card"><h3>📢 Post Announcement</h3>
      <div class="form-group"><label>Message</label><textarea id="ann-msg" rows="2"></textarea></div>
      <div class="form-group"><label>Type</label><select id="ann-type"><option>info</option><option>success</option><option>warning</option><option>urgent</option></select></div>
      <button class="btn-primary" onclick="addAnnouncement()">Post</button></div>
      <div class="card"><h3>Announcements</h3><table><thead><tr><th>Message</th><th>Type</th><th>Actions</th></tr></thead><tbody>
      ${(anns||[]).map(a => `<tr><td>${a.message}</td><td>${a.type}</td><td><button class="btn-danger btn-sm" onclick="deleteItem('announcements','${a.id}')">Del</button></td></tr>`).join('')}</tbody></table></div>`;
  }
  
  else if (tabName === 'applications') {
    const { data: apps } = await sb.from('applications').select('*, profiles(full_name)').order('created_at',{ascending:false});
    html = `<div class="card"><h3>📋 Applications</h3><table><thead><tr><th>User</th><th>Type</th><th>Status</th><th>Actions</th></tr></thead><tbody>
      ${(apps||[]).map(a => `<tr><td>${a.profiles?.full_name||'-'}</td><td>${a.type}</td><td>${a.status}</td><td>${a.status==='pending'?`<button class="btn-success btn-sm" onclick="approveApp('${a.id}')">Approve</button> <button class="btn-danger btn-sm" onclick="rejectApp('${a.id}')">Reject</button>`:'-'}</td></tr>`).join('')}</tbody></table></div>`;
  }
  
  else if (tabName === 'messages') {
    const { data: msgs } = await sb.from('contact_messages').select('*').order('created_at',{ascending:false});
    html = `<div class="card"><h3>✉️ Contact Messages</h3><table><thead><tr><th>From</th><th>Email</th><th>Message</th><th>Date</th></tr></thead><tbody>
      ${(msgs||[]).map(m => `<tr><td>${m.name}</td><td>${m.email}</td><td>${m.message?.substring(0,80)}</td><td>${new Date(m.created_at).toLocaleDateString()}</td></tr>`).join('')}</tbody></table></div>`;
  }
  
  else if (tabName === 'settings') {
    const { data: settings } = await sb.from('site_settings').select('*');
    html = `<div class="card"><h3>⚙️ Site Settings</h3>
      ${(settings||[]).map(s => `<div class="form-group"><label>${s.key}</label><input id="set-${s.key}" value="${s.value||''}"></div>`).join('')}
      <button class="btn-primary" onclick="saveSettings()">Save Settings</button></div>`;
  }
  
  main.innerHTML = html;
}

// ========== CRUD FUNCTIONS ==========
async function addDepartment() {
  const name = document.getElementById('dept-name').value.trim();
  if (!name) return showToast('Name required', true);
  await sb.from('departments').insert({ name, description: document.getElementById('dept-desc').value });
  showToast('Department created!');
  switchTab('departments');
}

async function addAuthority() {
  const title = document.getElementById('auth-title').value.trim();
  const level = parseInt(document.getElementById('auth-level').value);
  if (!title || !level) return showToast('Title and level required', true);
  await sb.from('authority').insert({
    title, level,
    profile_id: document.getElementById('auth-user').value || null,
    department_id: document.getElementById('auth-dept').value || null
  });
  showToast('Authority assigned!');
  switchTab('authority');
}

async function addJob() {
  const title = document.getElementById('job-title').value.trim();
  if (!title) return showToast('Title required', true);
  await sb.from('jobs').insert({
    title,
    description: document.getElementById('job-desc').value,
    department_id: document.getElementById('job-dept').value || null,
    location: document.getElementById('job-loc').value,
    type: document.getElementById('job-type').value,
    salary: document.getElementById('job-salary').value,
    posted_by: adminUser.id
  });
  showToast('Job posted!');
  switchTab('jobs');
}

async function addService() {
  const title = document.getElementById('svc-title').value.trim();
  if (!title) return showToast('Title required', true);
  await sb.from('services').insert({
    title,
    description: document.getElementById('svc-desc').value,
    price: document.getElementById('svc-price').value,
    department_id: document.getElementById('svc-dept').value || null,
    posted_by: adminUser.id
  });
  showToast('Service added!');
  switchTab('services');
}

async function toggleService(id, status) {
  await sb.from('services').update({ is_active: status }).eq('id', id);
  showToast(status ? 'Activated' : 'Hidden');
  switchTab('services');
}

async function addMarketplaceItem() {
  const title = document.getElementById('mp-title').value.trim();
  if (!title) return showToast('Title required', true);
  const img = document.getElementById('mp-image').value;
  await sb.from('marketplace_items').insert({
    title,
    description: document.getElementById('mp-desc').value,
    category: document.getElementById('mp-cat').value,
    price: parseFloat(document.getElementById('mp-price').value) || 0,
    seller_contact: document.getElementById('mp-contact').value,
    images: img ? [img] : [],
    posted_by: adminUser.id
  });
  showToast('Item added!');
  switchTab('marketplace');
}

async function addNews() {
  const title = document.getElementById('news-title').value.trim();
  if (!title) return showToast('Title required', true);
  await sb.from('news_posts').insert({
    title,
    content: document.getElementById('news-content').value,
    type: document.getElementById('news-type').value,
    media_url: document.getElementById('news-media').value,
    posted_by: adminUser.id
  });
  showToast('News published!');
  switchTab('news');
}

async function addAnnouncement() {
  const msg = document.getElementById('ann-msg').value.trim();
  if (!msg) return showToast('Message required', true);
  await sb.from('announcements').insert({
    message: msg,
    type: document.getElementById('ann-type').value,
    posted_by: adminUser.id
  });
  showToast('Announcement posted!');
  switchTab('announcements');
}

async function updateRole(userId, role) {
  await sb.from('profiles').update({ role }).eq('id', userId);
  showToast('Role updated!');
  switchTab('users');
}

async function deleteUser(userId) {
  if (!confirm('Delete this user permanently?')) return;
  await sb.from('profiles').delete().eq('id', userId);
  showToast('User deleted!');
  switchTab('users');
}

async function approveApp(id) {
  await sb.from('applications').update({ status: 'approved', reviewed_by: adminUser.id }).eq('id', id);
  showToast('Approved!');
  switchTab('applications');
}

async function rejectApp(id) {
  await sb.from('applications').update({ status: 'rejected', reviewed_by: adminUser.id }).eq('id', id);
  showToast('Rejected!');
  switchTab('applications');
}

async function deleteItem(table, id) {
  if (!confirm('Delete permanently?')) return;
  await sb.from(table).delete().eq('id', id);
  showToast('Deleted!');
  switchTab(table === 'departments' ? 'departments' : table === 'authority' ? 'authority' : table === 'jobs' ? 'jobs' : table === 'services' ? 'services' : table === 'marketplace_items' ? 'marketplace' : table === 'news_posts' ? 'news' : table === 'announcements' ? 'announcements' : 'users');
}

async function saveSettings() {
  const inputs = document.querySelectorAll('[id^="set-"]');
  for (let inp of inputs) {
    const key = inp.id.replace('set-', '');
    await sb.from('site_settings').update({ value: inp.value }).eq('key', key);
  }
  showToast('Settings saved!');
}

// ========== START ==========
init();
</script>
</body>
</html>
