<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascenda Groups - Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #ffffff;
        }

        .admin-header {
            background: #0f1444;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(102, 126, 234, 0.3);
        }

        .admin-header h1 {
            font-size: 1.5rem;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-back {
            padding: 0.5rem 1.5rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            background: #0f1444;
            overflow-x: auto;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
        }

        .tab-btn {
            padding: 0.6rem 1.2rem;
            border: 1px solid rgba(102, 126, 234, 0.3);
            background: transparent;
            color: #a0aec0;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            font-size: 0.9rem;
        }

        .tab-btn:hover, .tab-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .tab-content {
            display: none;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .tab-content.active {
            display: block;
        }

        .section-title {
            font-size: 1.5rem;
            color: #667eea;
            margin-bottom: 1.5rem;
        }

        .form-card {
            background: #1a1f4e;
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            color: #667eea;
            font-size: 0.9rem;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.7rem;
            border-radius: 8px;
            border: 1px solid rgba(102, 126, 234, 0.3);
            background: #0a0e27;
            color: white;
            font-size: 0.9rem;
        }

        .btn {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-warning {
            background: #ed8936;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            background: #1a1f4e;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(102, 126, 234, 0.1);
        }

        th {
            background: #0f1444;
            color: #667eea;
            font-weight: 600;
        }

        tr:hover {
            background: rgba(102, 126, 234, 0.05);
        }

        .badge {
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .badge-admin { background: rgba(159, 122, 234, 0.3); color: #9f7aea; }
        .badge-user { background: rgba(102, 126, 234, 0.3); color: #667eea; }
        .badge-agent { background: rgba(72, 187, 120, 0.3); color: #48bb78; }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            table {
                font-size: 0.8rem;
            }
            
            th, td {
                padding: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>⚙️ Admin Panel</h1>
        <a href="index.html" class="btn-back">← Back to Site</a>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="users">👥 Users</button>
        <button class="tab-btn" data-tab="departments">🏢 Departments</button>
        <button class="tab-btn" data-tab="authority">📊 Authority</button>
        <button class="tab-btn" data-tab="jobs">💼 Jobs</button>
        <button class="tab-btn" data-tab="services">🛠️ Services</button>
        <button class="tab-btn" data-tab="marketplace">🛒 Marketplace</button>
        <button class="tab-btn" data-tab="news">📰 News</button>
        <button class="tab-btn" data-tab="announcements">📢 Announcements</button>
        <button class="tab-btn" data-tab="applications">📝 Applications</button>
        <button class="tab-btn" data-tab="messages">💬 Messages</button>
        <button class="tab-btn" data-tab="settings">⚙️ Settings</button>
    </div>

    <!-- Users Tab -->
    <div class="tab-content active" id="tab-users">
        <h2 class="section-title">Manage Users</h2>
        <div id="usersTable"></div>
    </div>

    <!-- Departments Tab -->
    <div class="tab-content" id="tab-departments">
        <h2 class="section-title">Departments</h2>
        <div class="form-card">
            <h3 style="color:#667eea;margin-bottom:1rem;">Add Department</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Department Name</label>
                    <input type="text" id="deptName" placeholder="e.g., Forex Trading">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="deptDesc" placeholder="Department description">
                </div>
            </div>
            <button class="btn btn-primary" onclick="addDepartment()">Add Department</button>
        </div>
        <div id="departmentsTable"></div>
    </div>

    <!-- Jobs Tab -->
    <div class="tab-content" id="tab-jobs">
        <h2 class="section-title">Job Postings</h2>
        <div class="form-card">
            <h3 style="color:#667eea;margin-bottom:1rem;">Post New Job</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" id="jobTitle" placeholder="Job title">
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select id="jobDept"></select>
                </div>
                <div class="form-group">
                    <label>Job Type</label>
                    <select id="jobType">
                        <option>Full-time</option>
                        <option>Part-time</option>
                        <option>Contract</option>
                        <option>Remote</option>
                        <option>Freelance</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="jobLocation" placeholder="Location">
                </div>
                <div class="form-group">
                    <label>Salary</label>
                    <input type="text" id="jobSalary" placeholder="e.g., $50,000/year">
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="jobDesc" rows="4" placeholder="Job description..."></textarea>
            </div>
            <button class="btn btn-primary" onclick="addJob()">Post Job</button>
        </div>
        <div id="jobsTable"></div>
    </div>

    <!-- Services Tab -->
    <div class="tab-content" id="tab-services">
        <h2 class="section-title">Services</h2>
        <div class="form-card">
            <h3 style="color:#667eea;margin-bottom:1rem;">Add Service</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Service Title</label>
                    <input type="text" id="serviceTitle" placeholder="Service name">
                </div>
                <div class="form-group">
                    <label>Price</label>
                    <input type="text" id="servicePrice" placeholder="e.g., $100">
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select id="serviceDept"></select>
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="serviceDesc" rows="3" placeholder="Service description..."></textarea>
            </div>
            <button class="btn btn-primary" onclick="addService()">Add Service</button>
        </div>
        <div id="servicesTable"></div>
    </div>

    <!-- Marketplace Tab -->
    <div class="tab-content" id="tab-marketplace">
        <h2 class="section-title">Marketplace Items</h2>
        <div class="form-card">
            <h3 style="color:#667eea;margin-bottom:1rem;">Add Item</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Item Title</label>
                    <input type="text" id="itemTitle" placeholder="Item name">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="itemCategory">
                        <option>Houses</option>
                        <option>Cars</option>
                        <option>Valuables</option>
                        <option>E-Services</option>
                        <option>Digital</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Price</label>
                    <input type="text" id="itemPrice" placeholder="Price">
                </div>
                <div class="form-group">
                    <label>Seller Contact</label>
                    <input type="text" id="itemContact" placeholder="Phone or email">
                </div>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="itemDesc" rows="3" placeholder="Item description..."></textarea>
            </div>
            <button class="btn btn-primary" onclick="addMarketplaceItem()">Add Item</button>
        </div>
        <div id="marketplaceTable"></div>
    </div>

    <!-- News Tab -->
    <div class="tab-content" id="tab-news">
        <h2 class="section-title">News Posts</h2>
        <div class="form-card">
            <h3 style="color:#667eea;margin-bottom:1rem;">Publish News</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="newsTitle" placeholder="News title">
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="newsType">
                        <option value="article">Article</option>
                        <option value="youtube">YouTube</option>
                        <option value="image">Image</option>
                        <option value="document">Document</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Media URL</label>
                    <input type="text" id="newsMedia" placeholder="Optional media URL">
                </div>
            </div>
            <div class="form-group">
                <label>Content</label>
                <textarea id="newsContent" rows="4" placeholder="News content..."></textarea>
            </div>
            <button class="btn btn-primary" onclick="addNews()">Publish News</button>
        </div>
        <div id="newsTable"></div>
    </div>

    <!-- Announcements Tab -->
    <div class="tab-content" id="tab-announcements">
        <h2 class="section-title">Announcements</h2>
        <div class="form-card">
            <h3 style="color:#667eea;margin-bottom:1rem;">Post Announcement</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Message</label>
                    <input type="text" id="announceMsg" placeholder="Announcement message">
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="announceType">
                        <option>info</option>
                        <option>success</option>
                        <option>warning</option>
                        <option>urgent</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" onclick="addAnnouncement()">Post Announcement</button>
        </div>
        <div id="announcementsTable"></div>
    </div>

    <!-- Applications Tab -->
    <div class="tab-content" id="tab-applications">
        <h2 class="section-title">Applications</h2>
        <div id="applicationsTable"></div>
    </div>

    <!-- Messages Tab -->
    <div class="tab-content" id="tab-messages">
        <h2 class="section-title">Contact Messages</h2>
        <div id="messagesTable"></div>
    </div>

    <!-- Settings Tab -->
    <div class="tab-content" id="tab-settings">
        <h2 class="section-title">Site Settings</h2>
        <div class="form-card">
            <div class="form-row">
                <div class="form-group">
                    <label>Site Name</label>
                    <input type="text" id="siteName" placeholder="Ascenda Groups">
                </div>
                <div class="form-group">
                    <label>Site Description</label>
                    <input type="text" id="siteDesc" placeholder="Site description">
                </div>
                <div class="form-group">
                    <label>Copyright Year</label>
                    <input type="text" id="copyrightYear" placeholder="2026">
                </div>
            </div>
            <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
        </div>
    </div>

    <script src="supabase.js"></script>
    <script>
        let currentUser = null;
        let currentProfile = null;

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                btn.classList.add('active');
                document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
                
                loadTabData(btn.dataset.tab);
            });
        });

        // Initialize
        async function init() {
            currentUser = await checkAuth();
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }

            currentProfile = await getUserProfile(currentUser.id);
            if (!isAdmin(currentProfile)) {
                alert('Access denied. Admin only.');
                window.location.href = 'index.html';
                return;
            }

            loadTabData('users');
        }

        function loadTabData(tab) {
            switch(tab) {
                case 'users': loadUsers(); break;
                case 'departments': loadDepartments(); break;
                case 'jobs': loadJobs(); loadDeptDropdowns(); break;
                case 'services': loadServices(); loadDeptDropdowns(); break;
                case 'marketplace': loadMarketplace(); break;
                case 'news': loadNews(); break;
                case 'announcements': loadAnnouncements(); break;
                case 'applications': loadApplications(); break;
                case 'messages': loadMessages(); break;
            }
        }

        // Load Users
        async function loadUsers() {
            const { data, error } = await supabase.from('profiles').select('*').order('created_at', { ascending: false });
            if (error) return console.error(error);

            document.getElementById('usersTable').innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.map(user => `
                            <tr>
                                <td>${user.full_name || 'N/A'}</td>
                                <td>${user.email || 'N/A'}</td>
                                <td>
                                    <select onchange="changeUserRole('${user.id}', this.value)" style="background:#0a0e27;color:white;border:1px solid #667eea;border-radius:5px;padding:0.3rem;">
                                        <option ${user.role === 'user' ? 'selected' : ''}>user</option>
                                        <option ${user.role === 'agent' ? 'selected' : ''}>agent</option>
                                        <option ${user.role === 'worker' ? 'selected' : ''}>worker</option>
                                        <option ${user.role === 'dept_admin' ? 'selected' : ''}>dept_admin</option>
                                        <option ${user.role === 'admin' ? 'selected' : ''}>admin</option>
                                    </select>
                                </td>
                                <td>
                                    <button class="btn btn-danger" onclick="deleteUser('${user.id}')" style="padding:0.3rem 0.8rem;font-size:0.8rem;">Delete</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function changeUserRole(userId, newRole) {
            const { error } = await supabase.from('profiles').update({ role: newRole }).eq('id', userId);
            if (error) alert('Error: ' + error.message);
            else alert('Role updated!');
        }

        async function deleteUser(userId) {
            if (!confirm('Are you sure you want to delete this user?')) return;
            const { error } = await supabase.from('profiles').delete().eq('id', userId);
            if (error) alert('Error: ' + error.message);
            else {
                alert('User deleted!');
                loadUsers();
            }
        }

        // Load Departments
        async function loadDepartments() {
            const { data, error } = await supabase.from('departments').select('*');
            if (error) return console.error(error);

            document.getElementById('departmentsTable').innerHTML = `
                <table>
                    <thead><tr><th>Name</th><th>Description</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody>
                        ${data.map(dept => `
                            <tr>
                                <td>${dept.name}</td>
                                <td>${dept.description || 'N/A'}</td>
                                <td>${dept.is_active ? '✅ Active' : '❌ Inactive'}</td>
                                <td>
                                    <button class="btn btn-danger" onclick="deleteDepartment('${dept.id}')" style="padding:0.3rem 0.8rem;font-size:0.8rem;">Delete</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function addDepartment() {
            const name = document.getElementById('deptName').value;
            const desc = document.getElementById('deptDesc').value;
            if (!name) return alert('Enter department name');

            const { error } = await supabase.from('departments').insert({ name, description: desc, is_active: true });
            if (error) alert('Error: ' + error.message);
            else {
                alert('Department added!');
                document.getElementById('deptName').value = '';
                document.getElementById('deptDesc').value = '';
                loadDepartments();
            }
        }

        async function deleteDepartment(id) {
            if (!confirm('Delete this department?')) return;
            const { error } = await supabase.from('departments').delete().eq('id', id);
            if (error) alert('Error: ' + error.message);
            else {
                alert('Deleted!');
                loadDepartments();
            }
        }

        // Load dropdowns
        async function loadDeptDropdowns() {
            const { data } = await supabase.from('departments').select('*').eq('is_active', true);
            if (!data) return;

            const dropdowns = ['jobDept', 'serviceDept'];
            dropdowns.forEach(dropId => {
                const select = document.getElementById(dropId);
                if (select) {
                    select.innerHTML = '<option value="">Select department</option>' + 
                        data.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
                }
            });
        }

        // Add Job
        async function addJob() {
            const job = {
                title: document.getElementById('jobTitle').value,
                department_id: document.getElementById('jobDept').value,
                type: document.getElementById('jobType').value,
                location: document.getElementById('jobLocation').value,
                salary: document.getElementById('jobSalary').value,
                description: document.getElementById('jobDesc').value,
                is_active: true,
                posted_by: currentUser.id
            };

            if (!job.title) return alert('Enter job title');

            const { error } = await supabase.from('jobs').insert(job);
            if (error) alert('Error: ' + error.message);
            else {
                alert('Job posted!');
                loadJobs();
            }
        }

        async function loadJobs() {
            const { data } = await supabase.from('jobs').select('*, departments(name)').order('created_at', { ascending: false });
            document.getElementById('jobsTable').innerHTML = data ? `
                <table>
                    <thead><tr><th>Title</th><th>Department</th><th>Type</th><th>Actions</th></tr></thead>
                    <tbody>
                        ${data.map(job => `
                            <tr>
                                <td>${job.title}</td>
                                <td>${job.departments?.name || 'N/A'}</td>
                                <td>${job.type}</td>
                                <td>
                                    <button class="btn btn-danger" onclick="deleteJob('${job.id}')" style="padding:0.3rem 0.8rem;font-size:0.8rem;">Delete</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            ` : '<p>No jobs</p>';
        }

        async function deleteJob(id) {
            if (!confirm('Delete this job?')) return;
            await supabase.from('jobs').delete().eq('id', id);
            loadJobs();
        }

        // Add Service
        async function addService() {
            const service = {
                title: document.getElementById('serviceTitle').value,
                price: document.getElementById('servicePrice').value,
                department_id: document.getElementById('serviceDept').value,
                description: document.getElementById('serviceDesc').value,
                is_active: true,
                posted_by: currentUser.id
            };

            if (!service.title) return alert('Enter service title');

            const { error } = await supabase.from('services').insert(service);
            if (error) alert('Error: ' + error.message);
            else {
                alert('Service added!');
                loadServices();
            }
        }

        async function loadServices() {
            const { data } = await supabase.from('services').select('*, departments(name)').order('created_at', { ascending: false });
            document.getElementById('servicesTable').innerHTML = data ? `
                <table>
                    <thead><tr><th>Title</th><th>Price</th><th>Department</th><th>Actions</th></tr></thead>
                    <tbody>
                        ${data.map(s => `
                            <tr>
                                <td>${s.title}</td>
                                <td>${s.price || 'N/A'}</td>
                                <td>${s.departments?.name || 'N/A'}</td>
                                <td>
                                    <button class="btn btn-danger" onclick="deleteService('${s.id}')" style="padding:0.3rem 0.8rem;font-size:0.8rem;">Delete</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            ` : '<p>No services</p>';
        }

        async function deleteService(id) {
            if (!confirm('Delete this service?')) return;
            await supabase.from('services').delete().eq('id', id);
            loadServices();
        }

        // Marketplace
        async function addMarketplaceItem() {
            const item = {
                title: document.getElementById('itemTitle').value,
                category: document.getElementById('itemCategory').value,
                price: document.getElementById('itemPrice').value,
                seller_contact: document.getElementById('itemContact').value,
                description: document.getElementById('itemDesc').value,
                is_active: true,
                posted_by: currentUser.id
            };

            if (!item.title) return alert('Enter item title');

            const { error } = await supabase.from('marketplace_items').insert(item);
            if (error) alert('Error: ' + error.message);
            else {
                alert('Item added!');
                loadMarketplace();
            }
        }

        async function loadMarketplace() {
            const { data } = await supabase.from('marketplace_items').select('*').order('created_at', { ascending: false });
            document.getElementById('marketplaceTable').innerHTML = data ? `
                <table>
                    <thead><tr><th>Title</th><th>Category</th><th>Price</th><th>Actions</th></tr></thead>
                    <tbody>
                        ${data.map(item => `
                            <tr>
                                <td>${item.title}</td>
                                <td>${item.category}</td>
                                <td>${item.price || 'N/A'}</td>
                                <td>
                                    <button class="btn btn-danger" onclick="deleteItem('${item.id}')" style="padding:0.3rem 0.8rem;font-size:0.8rem;">Delete</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            ` : '<p>No items</p>';
        }

        async function deleteItem(id) {
            if (!confirm('Delete this item?')) return;
            await supabase.from('marketplace_items').delete().eq('id', id);
            loadMarketplace();
        }

        // News
        async function addNews() {
            const news = {
                title: document.getElementById('newsTitle').value,
                type: document.getElementById('newsType').value,
                media_url: document.getElementById('newsMedia').value,
                content: document.getElementById('newsContent').value,
                is_published: true,
                posted_by: currentUser.id
            };

            if (!news.title) return alert('Enter news title');

            const { error } = await supabase.from('news_posts').insert(news);
            if (error) alert('Error: ' + error.message);
            else {
                alert('News published!');
                loadNews();
            }
        }

        async function loadNews() {
            const { data } = await supabase.from('news_posts').select('*').order('created_at', { ascending: false });
            document.getElementById('newsTable').innerHTML = data ? `
                <table>
                    <thead><tr><th>Title</th><th>Type</th><th>Date</th><th>Actions</th></tr></thead>
                    <tbody>
                        ${data.map(n => `
                            <tr>
                                <td>${n.title}</td>
                                <td>${n.type}</td>
                                <td>${new Date(n.created_at).toLocaleDateString()}</td>
                                <td>
                                    <button class="btn btn-danger" onclick="deleteNews('${n.id}')" style="padding:0.3rem 0.8rem;font-size:0.8rem;">Delete</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            ` : '<p>No news</p>';
        }

        async function deleteNews(id) {
            if (!confirm('Delete this news post?')) return;
            await supabase.from('news_posts').delete().eq('id', id);
            loadNews();
        }

        // Announcements
        async function addAnnouncement() {
            const announcement = {
                message: document.getElementById('announceMsg').value,
                type: document.getElementById('announceType').value,
                is_active: true,
                posted_by: currentUser.id
            };

            if (!announcement.message) return alert('Enter announcement message');

            const { error } = await supabase.from('announcements').insert(announcement);
            if (error) alert('Error: ' + error.message);
            else {
                alert('Announcement posted!');
                loadAnnouncements();
            }
        }

        async function loadAnnouncements() {
            const { data } = await supabase.from('announcements').select('*').order('created_at', { ascending: false });
            document.getElementById('announcementsTable').innerHTML = data ? `
                <table>
                    <thead><tr><th>Message</th><th>Type</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody>
                        ${data.map(a => `
                            <tr>
                                <td>${a.message}</td>
                                <td><span class="badge badge-${a.type === 'urgent' ? 'admin' : 'user'}">${a.type}</span></td>
                                <td>${a.is_active ? '✅' : '❌'}</td>
                                <td>
                                    <button class="btn btn-danger" onclick="deleteAnnouncement('${a.id}')" style="padding:0.3rem 0.8rem;font-size:0.8rem;">Delete</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            ` : '<p>No announcements</p>';
        }

        async function deleteAnnouncement(id) {
            if (!confirm('Delete this announcement?')) return;
            await supabase.from('announcements').delete().eq('id', id);
            loadAnnouncements();
        }

        // Applications
        async function loadApplications() {
            const { data } = await supabase.from('applications').select('*, profiles!applications_applicant_id_fkey(full_name, email)').order('created_at', { ascending: false });
            document.getElementById('applicationsTable').innerHTML = data ? `
                <table>
                    <thead><tr><th>Applicant</th><th>Type</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody>
                        ${data.map(app => `
                            <tr>
                                <td>${app.profiles?.full_name || 'N/A'}</td>
                                <td>${app.type}</td>
                                <td><span class="badge badge-${app.status === 'approved' ? 'agent' : app.status === 'rejected' ? 'admin' : 'user'}">${app.status}</span></td>
                                <td>
                                    ${app.status === 'pending' ? `
                                        <button class="btn btn-success" onclick="updateApplication('${app.id}', 'approved', '${app.applicant_id}')" style="padding:0.3rem 0.8rem;font-size:0.8rem;">Approve</button>
                                        <button class="btn btn-danger" onclick="updateApplication('${app.id}', 'rejected', '${app.applicant_id}')" style="padding:0.3rem 0.8rem;font-size:0.8rem;">Reject</button>
                                    ` : '<span>Processed</span>'}
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            ` : '<p>No applications</p>';
        }

        async function updateApplication(id, status, userId) {
            const { error } = await supabase.from('applications').update({ status, reviewed_by: currentUser.id }).eq('id', id);
            if (error) return alert('Error: ' + error.message);
            
            if (status === 'approved') {
                await supabase.from('profiles').update({ role: 'agent' }).eq('id', userId);
            }
            
            alert('Application ' + status + '!');
            loadApplications();
        }

        // Messages
        async function loadMessages() {
            const { data } = await supabase.from('contact_messages').select('*').order('created_at', { ascending: false });
            document.getElementById('messagesTable').innerHTML = data ? `
                <table>
                    <thead><tr><th>From</th><th>Subject</th><th>Message</th><th>Date</th></tr></thead>
                    <tbody>
                        ${data.map(msg => `
                            <tr>
                                <td>${msg.name}<br><small>${msg.email}</small></td>
                                <td>${msg.subject}</td>
                                <td>${msg.message?.substring(0, 100)}...</td>
                                <td>${new Date(msg.created_at).toLocaleDateString()}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            ` : '<p>No messages</p>';
        }

        // Settings
        async function saveSettings() {
            const settings = [
                { key: 'site_name', value: document.getElementById('siteName').value },
                { key: 'site_description', value: document.getElementById('siteDesc').value },
                { key: 'copyright_year', value: document.getElementById('copyrightYear').value }
            ];

            for (const setting of settings) {
                if (setting.value) {
                    const { error } = await supabase.from('site_settings').upsert(setting);
                    if (error) console.error(error);
                }
            }
            alert('Settings saved!');
        }

        init();
    </script>
</body>
</html>
