  <!-- Jobs Content -->

  <script src="supabase.js"></script>
  <script src="script.js"></script>
  <script>
    // Override loadJobs to run only once
    window.originalLoadJobs = window.loadJobs || function(){};
    window.loadJobs = async function() {
      if (window.jobsLoaded) return;
      window.jobsLoaded = true;

      const container = document.getElementById('jobs-list');
      if (!container) return;

      try {
        const sb = window.supabaseClient || supabase.createClient(
          window.SUPABASE_URL,
          window.SUPABASE_ANON_KEY,
          { auth: { persistSession: true } }
        );
        const { data, error } = await sb
          .from('jobs')
          .select('*')
          .eq('is_active', true)
          .order('created_at', { ascending: false });

        if (error) throw error;

        if (!data || data.length === 0) {
          container.innerHTML = '<p style="text-align:center;color:var(--text-muted);">No jobs yet. Add from admin panel.</p>';
          return;
        }

        container.innerHTML = data.map(j => `
          <div class="card">
            <span class="badge badge-blue">Job</span>
            <h3>${j.title}</h3>
            <p>📍 ${j.location || 'Remote'} · ${j.type || 'Full-time'}</p>
            <p>${(j.description || '').substring(0, 100)}</p>
            <button class="btn btn-primary" onclick="applyForJob('${j.id}')">Apply Now</button>
          </div>
        `).join('');

        // Re‑attach apply function
        window.applyForJob = async function(jobId) {
          const sb = window.supabaseClient || supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
          const { data: { user } } = await sb.auth.getUser();
          if (!user) { alert('Please login first'); window.location.href='login.html'; return; }
          const { error } = await sb.from('job_applications').insert({ job_id: jobId, applicant_id: user.id });
          if (error) alert('Application failed: ' + error.message);
          else alert('Applied successfully!');
        };
      } catch (err) {
        container.innerHTML = `<p style="color:red;">Error: ${err.message}</p>`;
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => { if (typeof loadJobs === 'function') loadJobs(); }, 100);
    });
  </script>
</body>
