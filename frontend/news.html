<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News - Ascenda Groups</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
    .news-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; cursor: pointer; transition: all 0.3s ease; }
    .news-card:hover { border-color: var(--blue); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
    .news-thumb { width: 100%; height: 200px; object-fit: cover; background: var(--bg-secondary); position: relative; }
    .news-thumb .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 3rem; opacity: 0.8; pointer-events: none; }
    .news-body { padding: 20px; }
    .news-body h3 { font-size: 1.1rem; margin-bottom: 8px; }
    .news-body p { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .news-meta { display: flex; justify-content: space-between; margin-top: 12px; color: var(--text-muted); font-size: 0.8rem; }
    .filter-section { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 32px; }
    .filter-section button { padding: 10px 20px; border-radius: 50px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border); background: transparent; color: var(--text-secondary); transition: all 0.2s; }
    .filter-section button:hover { border-color: var(--blue); color: var(--blue); }
    .filter-section button.active { background: var(--gradient-btn); color: white; border-color: transparent; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.active { display: flex; }
    .modal-content { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 30px; position: relative; }
    .modal-close { position: absolute; top: 12px; right: 12px; background: var(--bg-hover); border: none; color: white; font-size: 1.2rem; cursor: pointer; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; }
    .modal-close:hover { background: var(--red); }
    .youtube-embed { width: 100%; aspect-ratio: 16/9; border-radius: 12px; margin-bottom: 20px; border: none; }
    .modal-image { width: 100%; border-radius: 12px; margin-bottom: 20px; }
    .skeleton { height: 300px; background: linear-gradient(90deg, var(--bg-card) 25%, var(--border) 50%, var(--bg-card) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 16px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>
<nav class="navbar"><div class="nav-container">
  <a href="index.html" class="logo"><img src="https://rfogomnbicceentrhymy.supabase.co/storage/v1/object/public/Ascenda%20pics/logo.png" alt="Ascenda"></a>
  <div class="nav-links">
    <a href="index.html">Home</a><a href="about.html">About</a><a href="services.html">Services</a><a href="marketplace.html">Marketplace</a><a href="jobs.html">Jobs</a><a href="news.html" class="active">News</a><a href="contact.html">Contact</a>
    <a href="login.html" class="btn btn-outline auth-login-btn">Login</a><a href="register.html" class="btn btn-primary auth-register-btn">Sign Up</a>
    <span class="auth-user-name" style="display:none;color:var(--blue);font-weight:600;"></span>
    <a href="#" class="btn btn-outline auth-logout-btn" style="display:none;">Logout</a>
  </div>
  <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
</div></nav>
<div class="mobile-nav" id="mobileNav">
  <a href="index.html">Home</a><a href="about.html">About</a><a href="services.html">Services</a><a href="marketplace.html">Marketplace</a><a href="jobs.html">Jobs</a><a href="news.html">News</a><a href="contact.html">Contact</a><a href="login.html">Login</a><a href="register.html">Sign Up</a>
</div>

<section class="section"><div class="container">
  <div class="section-header">
    <span class="section-badge">Updates</span>
    <h2>News & Media</h2>
    <p>Articles, YouTube videos, images & documents</p>
  </div>

  <div class="filter-section">
    <button class="active" data-filter="all">All</button>
    <button data-filter="article">📄 Articles</button>
    <button data-filter="youtube">▶️ YouTube</button>
    <button data-filter="image">🖼️ Images</button>
    <button data-filter="document">📁 Documents</button>
  </div>

  <div id="news-container" class="news-grid">
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
  </div>
</div></section>

<div class="modal-overlay" id="news-modal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<footer class="footer"><div class="footer-content">
  <div class="footer-links"><a href="index.html">Home</a><a href="about.html">About</a><a href="services.html">Services</a><a href="contact.html">Contact</a></div>
  <p>© 2026 Ascenda Groups. CEO: Eyakem Takele Kebede</p>
  <p><a href="https://t.me/ascendagroups" target="_blank">Telegram</a></p>
</div></footer>

<script src="supabase.js"></script>
<script>
if(!window.supabaseClient) window.supabaseClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY, {auth:{persistSession:true,autoRefreshToken:true,storage:localStorage}});
const sb = window.supabaseClient;
let allNews = [];

document.addEventListener('DOMContentLoaded', ()=>{ loadNews(); setupFilters(); });

function getYouTubeID(url) {
  if(!url) return null;
  const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
  const match = url.match(regExp);
  return (match && match[2].length === 11) ? match[2] : null;
}

function getThumbnail(item) {
  if(item.type === 'youtube') {
    const ytID = getYouTubeID(item.media_url);
    return ytID ? `https://img.youtube.com/vi/${ytID}/hqdefault.jpg` : null;
  }
  return item.media_url || null;
}

async function loadNews() {
  const {data} = await sb.from('news_posts').select('*').eq('is_published',true).order('created_at',{ascending:false});
  allNews = data || [];
  renderNews(allNews);
}

function renderNews(news) {
  const c = document.getElementById('news-container');
  if(!news.length) { c.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-muted);"><h3>No news yet</h3></div>'; return; }
  c.innerHTML = news.map(item=>{
    const thumb = getThumbnail(item);
    const isYT = item.type === 'youtube';
    return `<div class="news-card" onclick="openDetail('${item.id}')">
      <div class="news-thumb" style="${thumb?`background-image:url(${thumb});background-size:cover;background-position:center;`:''}">
        ${isYT?'<div class="play-icon">▶️</div>':''}
        ${!thumb?`<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:3rem;">${item.type==='document'?'📁':'📄'}</div>`:''}
      </div>
      <div class="news-body">
        <span class="badge badge-gold">${item.type}</span>
        <h3>${item.title}</h3>
        <p>${item.content||''}</p>
        <div class="news-meta"><span>📅 ${new Date(item.created_at).toLocaleDateString()}</span><span style="color:var(--blue);">Read More →</span></div>
      </div></div>`;
  }).join('');
}

function setupFilters() {
  document.querySelectorAll('.filter-section button').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.filter-section button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const f = btn.dataset.filter;
      renderNews(f==='all'?allNews:allNews.filter(n=>n.type===f));
    });
  });
}

function openDetail(id) {
  const item = allNews.find(n=>n.id===id);
  if(!item) return;
  const body = document.getElementById('modal-body');
  let media = '';
  if(item.type==='youtube'){
    const ytID = getYouTubeID(item.media_url);
    media = ytID ? `<iframe class="youtube-embed" src="https://www.youtube.com/embed/${ytID}" frameborder="0" allowfullscreen></iframe>` : '';
  } else if(item.type==='image' && item.media_url){
    media = `<img src="${item.media_url}" class="modal-image" alt="${item.title}">`;
  } else if(item.type==='document' && item.media_url){
    media = `<div style="text-align:center;padding:40px;font-size:4rem;">📁</div><a href="${item.media_url}" target="_blank" class="btn btn-primary btn-block">Download Document</a>`;
  }
  body.innerHTML = `${media}<span class="badge badge-gold">${item.type}</span><h2>${item.title}</h2><p style="color:var(--text-muted);">📅 ${new Date(item.created_at).toLocaleDateString()}</p><div style="color:var(--text-secondary);line-height:1.8;margin-top:12px;">${item.content||''}</div>`;
  document.getElementById('news-modal').classList.add('active');
  document.body.style.overflow='hidden';
}

function closeModal() {
  document.getElementById('news-modal').classList.remove('active');
  document.body.style.overflow='';
  document.getElementById('modal-body').innerHTML = '';
}
document.getElementById('news-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
</script>
</body>
</html>
