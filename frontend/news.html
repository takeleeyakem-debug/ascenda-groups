  <!-- News Content -->
  <section class="container" style="padding:40px 20px;">
    <h2 style="text-align:center;margin-bottom:24px;">News & Updates</h2>
    <div id="news-list" class="cards-grid">
      <p style="text-align:center;color:var(--text-muted);">Loading news...</p>
    </div>
  </section>

  <footer class="footer">
    <p>© 2026 Ascenda Groups. CEO: Eyakem Takele Kebede</p>
    <p><a href="https://t.me/ascendagroups" target="_blank">Telegram</a></p>
  </footer>

  <script src="supabase.js"></script>
  <script src="script.js"></script>
  <script>
    // Override loadNews to run only once
    window.originalLoadNews = window.loadNews || function(){};
    window.loadNews = async function() {
      if (window.newsLoaded) return;
      window.newsLoaded = true;

      const container = document.getElementById('news-list');
      if (!container) return;

      try {
        const sb = window.supabaseClient || supabase.createClient(
          window.SUPABASE_URL,
          window.SUPABASE_ANON_KEY,
          { auth: { persistSession: true } }
        );
        const { data, error } = await sb
          .from('news_posts')
          .select('*')
          .eq('is_published', true)
          .order('created_at', { ascending: false });

        if (error) throw error;

        if (!data || data.length === 0) {
          container.innerHTML = '<p style="text-align:center;color:var(--text-muted);">No news yet.</p>';
          return;
        }

        container.innerHTML = data.map(n => `
          <div class="card">
            ${n.media_url ? (n.type === 'video' ? `<video src="${n.media_url}" controls style="width:100%;border-radius:8px;"></video>` : `<img src="${n.media_url}" style="width:100%;border-radius:8px;">`) : ''}
            <span class="badge badge-gold">${n.type || 'article'}</span>
            <h3>${n.title}</h3>
            <p>${(n.content || '').substring(0, 150)}</p>
          </div>
        `).join('');
      } catch (err) {
        container.innerHTML = `<p style="color:red;">Error: ${err.message}</p>`;
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => { if (typeof loadNews === 'function') loadNews(); }, 100);
    });
  </script>
</body>
