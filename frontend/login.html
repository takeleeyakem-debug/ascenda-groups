<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Ascenda Groups</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo"><img src="https://rfogomnbicceentrhymy.supabase.co/storage/v1/object/public/Ascenda%20pics/logo.png" alt="Ascenda Groups"></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="register.html" class="btn btn-primary">Sign Up</a>
      </div>
    </div>
  </nav>

  <div class="form-container">
    <h2>Welcome Back 👋</h2>
    <div id="error-msg" style="color:red;text-align:center;margin-bottom:12px;display:none;"></div>
    <form id="login-form" onsubmit="return false;">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="button" id="login-btn" class="btn btn-primary btn-block btn-lg">Login</button>
    </form>
    <div class="form-divider">or</div>
    <button id="google-login" class="btn btn-outline btn-block btn-lg">🔵 Login with Google</button>
    <p style="text-align:center;margin-top:16px;color:var(--text-muted);">
      Don't have an account? <a href="register.html" style="color:var(--accent-blue);">Sign Up</a>
    </p>
  </div>

  <script>
    const SUPABASE_URL = 'https://rfogomnbicceentrhymy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmb2dvbW5iaWNjZWVudHJoeW15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDQwOTEsImV4cCI6MjA5NTgyMDA5MX0.wke5a7GEdU2oepfKfSD-rthLTEmpk3GqVfFRM_MjZ9c';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('login-btn').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const errorMsg = document.getElementById('error-msg');
      
      if (!email || !password) {
        errorMsg.textContent = 'Please fill all fields';
        errorMsg.style.display = 'block';
        return;
      }
      
      btn.disabled = true;
      btn.textContent = 'Logging in...';
      errorMsg.style.display = 'none';
      
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      
      if (error) {
        errorMsg.textContent = error.message;
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Login';
      } else {
        window.location.href = 'dashboard.html';
      }
    });

    document.getElementById('google-login').addEventListener('click', async () => {
      await supabase.auth.signInWithOAuth({ 
        provider: 'google',
        options: { redirectTo: window.location.origin + '/dashboard.html' }
      });
    });
  </script>
</body>
</html>
