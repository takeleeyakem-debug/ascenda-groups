<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Login - Ascenda Groups</title><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body>
<!-- INSERT UNIVERSAL NAVBAR HERE -->
<div class="form-container"><h2>Welcome Back</h2><div id="msg" style="display:none;padding:10px;border-radius:8px;margin-bottom:10px;"></div>
<input type="email" id="login-email" placeholder="Email"><input type="password" id="login-password" placeholder="Password">
<button class="btn btn-primary btn-block btn-lg" id="login-btn">Login</button>
<p style="text-align:center;margin-top:12px;">No account? <a href="register.html">Sign Up</a></p></div>
<script src="supabase.js"></script>
<script>
const sb = window.supabaseClient || window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY, {auth:{persistSession:true}});
document.getElementById('login-btn').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value, password = document.getElementById('login-password').value;
  const msg = document.getElementById('msg');
  if(!email||!password){ msg.textContent='Fill all fields'; msg.style.display='block'; msg.style.color='#ef4444'; return; }
  const { error } = await sb.auth.signInWithPassword({email, password});
  if (error) { msg.textContent=error.message; msg.style.display='block'; msg.style.color='#ef4444'; }
  else {
    const {data:{user}} = await sb.auth.getUser();
    const {data:profile} = await sb.from('profiles').select('role').eq('id',user.id).single();
    if(profile?.role==='admin'||profile?.role==='ceo'||email==='takeleeyakem@gmail.com') window.location.href='admin.html';
    else window.location.href='index.html';
  }
});
</script>
</body></html>
