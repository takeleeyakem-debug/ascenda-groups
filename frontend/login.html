<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Ascenda Groups</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<nav class="navbar"><div class="nav-container">
  <a href="index.html" class="logo"><img src="https://rfogomnbicceentrhymy.supabase.co/storage/v1/object/public/Ascenda%20pics/logo.png" alt="Ascenda"></a>
  <div class="nav-links"><a href="index.html">Home</a><a href="register.html" class="btn btn-primary">Sign Up</a></div>
</div></nav>

<div class="form-container">
  <h2>Welcome Back 👋</h2>
  <div id="error-msg" style="color:red;text-align:center;display:none;"></div>
  <div class="form-group"><label>Email</label><input type="email" id="login-email" required></div>
  <div class="form-group"><label>Password</label><input type="password" id="login-password" required></div>
  <button id="login-btn" class="btn btn-primary btn-block btn-lg">Login</button>
  <p style="text-align:center;margin-top:16px;">No account? <a href="register.html">Sign Up</a></p>
</div>

<script src="supabase.js"></script>
<script>
if(!window.supabaseClient) window.supabaseClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY, {auth:{persistSession:true,autoRefreshToken:true,storage:localStorage}});
const sb = window.supabaseClient;
document.getElementById('login-btn').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value, password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn'), err = document.getElementById('error-msg');
  btn.disabled=true; btn.textContent='Logging in...'; err.style.display='none';
  const {error} = await sb.auth.signInWithPassword({email,password});
  if(error){ err.textContent=error.message; err.style.display='block'; btn.disabled=false; btn.textContent='Login'; }
  else window.location.href='dashboard.html';
});
</script>
</body>
</html>
