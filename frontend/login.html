<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Ascenda Groups</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- Universal Navbar -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="landing.html" class="logo"><img src="https://rfogomnbicceentrhymy.supabase.co/storage/v1/object/public/Ascenda%20pics/logo.png" alt="Ascenda" style="height:36px;"></a>
      <div class="nav-links">
        <a href="landing.html">Home</a>
        <a href="register.html" class="btn btn-primary">Sign Up</a>
      </div>
    </div>
  </nav>

  <!-- Login Form -->
  <div class="form-container">
    <h2>Welcome Back 👋</h2>
    <div id="login-msg" style="display:none;padding:10px;border-radius:8px;margin-bottom:12px;"></div>
    
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" required placeholder="you@example.com">
    </div>
    
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" required placeholder="••••••••">
    </div>
    
    <button class="btn btn-primary btn-block btn-lg" id="login-btn">Login</button>
    <p style="text-align:center;margin-top:16px;">No account? <a href="register.html">Sign Up</a></p>
  </div>

  <footer class="footer">
    <p>© 2026 Ascenda Groups. CEO: Eyakem Takele Kebede</p>
  </footer>

  <script>
    // ========== SUPABASE ==========
    const sb = supabase.createClient(
      'https://rfogomnbicceentrhymy.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmb2dvbW5iaWNjZWVudHJoeW15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDQwOTEsImV4cCI6MjA5NTgyMDA5MX0.wke5a7GEdU2oepfKfSD-rthLTEmpk3GqVfFRM_MjZ9c',
      { auth: { persistSession: true, autoRefreshToken: true, storage: localStorage } }
    );

    document.getElementById('login-btn').addEventListener('click', async () => {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const msg = document.getElementById('login-msg');
      const btn = document.getElementById('login-btn');

      // Reset
      msg.style.display = 'none';

      // Validate
      if (!email || !password) {
        msg.textContent = 'Please fill all fields';
        msg.style.display = 'block';
        msg.style.color = '#ef4444';
        msg.style.background = 'rgba(239,68,68,0.1)';
        return;
      }

      // Loading
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      // Sign in
      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        msg.textContent = error.message;
        msg.style.display = 'block';
        msg.style.color = '#ef4444';
        msg.style.background = 'rgba(239,68,68,0.1)';
        btn.disabled = false;
        btn.textContent = 'Login';
        return;
      }

      // Success — check role
      const { data: profile } = await sb
        .from('profiles')
        .select('role')
        .eq('id', data.user.id)
        .single();

      const isAdminUser = 
        email === 'takeleeyakem@gmail.com' ||
        profile?.role === 'admin' ||
        profile?.role === 'ceo';

      // Redirect
      if (isAdminUser) {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
