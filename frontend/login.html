<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Ascenda Groups</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo"><img src="https://rfogomnbicceentrhymy.supabase.co/storage/v1/object/public/Ascenda%20pics/logo.png" alt="Ascenda Groups"></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="register.html" class="btn btn-primary">Sign Up</a>
      </div>
    </div>
  </nav>

  <div class="form-container">
    <h2>Welcome Back 👋</h2>
    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Login</button>
    </form>
    <div class="form-divider">or</div>
    <button id="google-login" class="btn btn-outline btn-block btn-lg">🔵 Login with Google</button>
    <p style="text-align:center;margin-top:16px;color:var(--text-muted);">
      Don't have an account? <a href="register.html" style="color:var(--accent-blue);">Sign Up</a>
    </p>
  </div>

  <script src="supabase.js"></script>
  <script src="script.js"></script>
</body>
</html>
