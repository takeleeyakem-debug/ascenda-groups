<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Login - Ascenda Groups</title><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"></head><body>
<nav class="navbar"><div class="nav-container"><a href="index.html" class="logo"><img src="https://rfogomnbicceentrhymy.supabase.co/storage/v1/object/public/Ascenda%20pics/logo.png" alt="Ascenda"></a><div class="nav-links"><a href="index.html">Home</a><a href="register.html" class="btn btn-primary nav-register">Sign Up</a></div></div></nav>

<div class="form-container"><h2>Welcome Back 👋</h2><div id="msg" style="text-align:center;display:none;padding:12px;border-radius:8px;margin-bottom:12px;"></div>
<div class="form-group"><label>Email</label><input type="email" id="login-email" required></div>
<div class="form-group"><label>Password</label><input type="password" id="login-password" required></div>
<button id="login-btn" class="btn btn-primary btn-block btn-lg">Login</button>
<p style="text-align:center;margin-top:16px;">No account? <a href="register.html">Sign Up</a></p></div>

<script src="supabase.js"></script>
<script>
if(!window.supabaseClient)window.supabaseClient=window.supabase.createClient(window.SUPABASE_URL,window.SUPABASE_ANON_KEY,{auth:{persistSession:true,autoRefreshToken:true,storage:localStorage}});
const sb=window.supabaseClient;
document.getElementById('login-btn').addEventListener('click',async()=>{
  const e=document.getElementById('login-email').value.trim(),p=document.getElementById('login-password').value;
  const b=document.getElementById('login-btn'),m=document.getElementById('msg');
  m.style.display='none';
  if(!e||!p){m.textContent='Fill all fields';m.style.display='block';m.style.color='#ef4444';m.style.background='rgba(239,68,68,0.1)';return;}
  b.disabled=true;b.textContent='Logging in...';
  const{data,error}=await sb.auth.signInWithPassword({email:e,password:p});
  if(error){m.textContent=error.message;m.style.display='block';m.style.color='#ef4444';m.style.background='rgba(239,68,68,0.1)';b.disabled=false;b.textContent='Login';return;}
  // Check if admin
  const{data:profile}=await sb.from('profiles').select('role').eq('id',data.user.id).single();
  if(profile?.role==='admin'||profile?.role==='ceo'||data.user.email==='takeleeyakem@gmail.com'){window.location.href='admin.html';}
  else{window.location.href='index.html';}
});
</script>
</body></html>
