<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Ascenda Groups</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar"><div class="nav-container">
  <a href="index.html" class="logo"><img src="https://rfogomnbicceentrhymy.supabase.co/storage/v1/object/public/Ascenda%20pics/logo.png" alt="Ascenda"></a>
  <div class="nav-links"><a href="index.html">Home</a><a href="register.html" class="btn btn-primary">Sign Up</a></div>
</div></nav>

<div class="form-container">
  <h2>Welcome Back 👋</h2>
  <div id="msg" style="text-align:center;display:none;padding:12px;border-radius:8px;margin-bottom:12px;"></div>
  <div class="form-group"><label>Email</label><input type="email" id="login-email" required></div>
  <div class="form-group"><label>Password</label><input type="password" id="login-password" required></div>
  <button id="login-btn" class="btn btn-primary btn-block btn-lg">Login</button>
  <p style="text-align:center;margin-top:16px;">No account? <a href="register.html">Sign Up</a></p>
</div>

<script>
const SUPABASE_URL = 'https://rfogomnbicceentrhymy.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmb2dvbW5iaWNjZWVudHJoeW15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDQwOTEsImV4cCI6MjA5NTgyMDA5MX0.wke5a7GEdU2oepfKfSD-rthLTEmpk3GqVfFRM_MjZ9c';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

document.getElementById('login-btn').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  const msg = document.getElementById('msg');

  msg.style.display = 'none';

  if (!email || !password) {
    msg.textContent = 'Please fill all fields';
    msg.style.display = 'block'; msg.style.color = '#ef4444'; msg.style.background = 'rgba(239,68,68,0.1)';
    return;
  }

  btn.disabled = true; btn.textContent = 'Logging in...';

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    msg.textContent = error.message;
    msg.style.display = 'block'; msg.style.color = '#ef4444'; msg.style.background = 'rgba(239,68,68,0.1)';
    btn.disabled = false; btn.textContent = 'Login';
  } else {
    window.location.href = 'index.html';
  }
});
</script>
</body>
</html>
