<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Ascenda Groups</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo"><img src="https://rfogomnbicceentrhymy.supabase.co/storage/v1/object/public/Ascenda%20pics/logo.png" alt="Ascenda Groups"></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="login.html" class="btn btn-outline">Login</a>
      </div>
    </div>
  </nav>

  <div class="form-container">
    <h2>Create Account 🚀</h2>
    <form id="register-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" required placeholder="John Doe">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="Min 6 characters" minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
    </form>
    <p style="text-align:center;margin-top:16px;color:var(--text-muted);">
      Already have an account? <a href="login.html" style="color:var(--accent-blue);">Login</a>
    </p>
    <div style="text-align:center;margin-top:20px;padding:16px;background:rgba(245,158,11,0.1);border-radius:8px;">
      <p style="font-size:0.85rem;">🤝 Want to earn commissions?</p>
      <p style="font-size:0.8rem;color:var(--text-muted);">After registering, go to your dashboard to apply as an agent!</p>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script src="script.js"></script>
</body>
</html>
