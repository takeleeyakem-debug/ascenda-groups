<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Ascenda Groups</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar"><div class="nav-container">
    <a href="index.html" class="logo"><img src="https://rfogomnbicceentrhymy.supabase.co/storage/v1/object/public/Ascenda%20pics/logo.png" alt="Ascenda"></a>
    <div class="nav-links"><a href="index.html">Home</a><a href="login.html" class="btn btn-outline">Login</a></div>
  </div></nav>

  <div class="form-container">
    <h2>Create Account 🚀</h2>
    <div id="error-msg" style="color:red;text-align:center;display:none;"></div>
    <div id="success-msg" style="color:green;text-align:center;display:none;"></div>
    <div class="form-group"><label>Full Name</label><input type="text" id="reg-name" required></div>
    <div class="form-group"><label>Email</label><input type="email" id="reg-email" required></div>
    <div class="form-group"><label>Password</label><input type="password" id="reg-password" required minlength="6"></div>
    <button id="register-btn" class="btn btn-primary btn-block btn-lg">Create Account</button>
    <p style="text-align:center;margin-top:16px;color:var(--text-muted);">Have account? <a href="login.html">Login</a></p>
  </div>

  <script src="supabase.js"></script>
  <script>
    (function() {
      if (!window.supabaseClient && window.supabase) {
        window.supabaseClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
      }
      const sb = window.supabaseClient;

      document.getElementById('register-btn').addEventListener('click', async () => {
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;
        const btn = document.getElementById('register-btn');
        const errEl = document.getElementById('error-msg');
        const sucEl = document.getElementById('success-msg');
        
        errEl.style.display = 'none';
        sucEl.style.display = 'none';
        
        if (!name || !email || !password) {
          errEl.textContent = 'Fill all fields'; errEl.style.display='block'; return;
        }
        
        btn.disabled = true; btn.textContent = 'Creating...';
        
        const { data, error } = await sb.auth.signUp({
          email, password,
          options: { data: { full_name: name } }
        });
        
        if (error) {
          errEl.textContent = error.message;
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Create Account';
        } else {
          sucEl.textContent = 'Account created! Redirecting...';
          sucEl.style.display = 'block';
          setTimeout(() => window.location.href = 'dashboard.html', 1500);
        }
      });
    })();
  </script>
</body>
</html>
