<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – Ascenda Groups</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo"><img src="https://rfogomnbicceentrhymy.supabase.co/storage/v1/object/public/Ascenda%20pics/logo.png" alt="Ascenda" style="height:36px;"></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="login.html" class="btn btn-outline">Login</a>
      </div>
    </div>
  </nav>

  <div class="form-container">
    <h2>Create Account 🚀</h2>
    <div id="reg-msg" style="display:none;padding:10px;border-radius:8px;margin-bottom:12px;"></div>
    <div class="form-group"><label>Full Name</label><input type="text" id="reg-name" required placeholder="Your full name"></div>
    <div class="form-group"><label>Email</label><input type="email" id="reg-email" required placeholder="you@example.com"></div>
    <div class="form-group"><label>Password</label><input type="password" id="reg-password" required placeholder="Min 6 characters" minlength="6"></div>
    <button class="btn btn-primary btn-block btn-lg" id="register-btn">Create Account</button>
    <p style="text-align:center;margin-top:16px;">Already have an account? <a href="login.html">Login</a></p>
  </div>

  <footer class="footer">
    <p>© 2026 Ascenda Groups. CEO: Eyakem Takele Kebede</p>
  </footer>

  <script>
    const sb = supabase.createClient('https://rfogomnbicceentrhymy.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmb2dvbW5iaWNjZWVudHJoeW15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDQwOTEsImV4cCI6MjA5NTgyMDA5MX0.wke5a7GEdU2oepfKfSD-rthLTEmpk3GqVfFRM_MjZ9c');
    document.getElementById('register-btn').addEventListener('click',async()=>{
      const name=document.getElementById('reg-name').value.trim(),email=document.getElementById('reg-email').value.trim(),password=document.getElementById('reg-password').value;
      const msg=document.getElementById('reg-msg'),btn=document.getElementById('register-btn');
      msg.style.display='none';
      if(!name||!email||!password){msg.textContent='Fill all fields';msg.style.display='block';msg.style.color='#ef4444';return;}
      if(password.length<6){msg.textContent='Password too short';msg.style.display='block';msg.style.color='#ef4444';return;}
      btn.disabled=true;btn.textContent='Creating...';
      const{data,error}=await sb.auth.signUp({email,password,options:{data:{full_name:name}}});
      if(error){msg.textContent=error.message;msg.style.color='#ef4444';msg.style.display='block';btn.disabled=false;btn.textContent='Create Account';return;}
      if(data.user){
        await sb.from('profiles').upsert({id:data.user.id,role:'user',full_name:name,email:email});
        await sb.auth.signInWithPassword({email,password});
        window.location.href='home.html';
      }
    });
  </script>
</body>
</html>
