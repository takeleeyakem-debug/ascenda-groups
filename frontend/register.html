<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Register - Ascenda Groups</title><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body>
<!-- INSERT UNIVERSAL NAVBAR HERE -->
<div class="form-container"><h2>Create Account</h2><div id="msg" style="display:none;padding:10px;border-radius:8px;margin-bottom:10px;"></div>
<input type="text" id="reg-name" placeholder="Full Name"><input type="email" id="reg-email" placeholder="Email"><input type="password" id="reg-password" placeholder="Password" minlength="6">
<button class="btn btn-primary btn-block btn-lg" id="register-btn">Sign Up</button>
<p style="text-align:center;margin-top:12px;">Have account? <a href="login.html">Login</a></p></div>
<script src="supabase.js"></script>
<script>
const sb = window.supabaseClient || window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
document.getElementById('register-btn').addEventListener('click', async () => {
  const name = document.getElementById('reg-name').value, email = document.getElementById('reg-email').value, password = document.getElementById('reg-password').value;
  const msg = document.getElementById('msg');
  if(!name||!email||!password){ msg.textContent='Fill all fields'; msg.style.display='block'; msg.style.color='#ef4444'; return; }
  const { data, error } = await sb.auth.signUp({ email, password, options:{data:{full_name:name}} });
  if (error) { msg.textContent=error.message; msg.style.display='block'; msg.style.color='#ef4444'; }
  else {
    await sb.from('profiles').upsert({ id: data.user.id, role:'user', full_name:name, email });
    await sb.auth.signInWithPassword({ email, password });
    window.location.href = 'index.html';
  }
});
</script>
</body></html>
