<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Ascenda Groups</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo"><img src="https://rfogomnbicceentrhymy.supabase.co/storage/v1/object/public/Ascenda%20pics/logo.png" alt="Ascenda Groups"></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="login.html" class="btn btn-outline">Login</a>
      </div>
    </div>
  </nav>

  <div class="form-container">
    <h2>Create Account 🚀</h2>
    <div id="error-msg" style="color:red;text-align:center;margin-bottom:12px;display:none;"></div>
    <div id="success-msg" style="color:green;text-align:center;margin-bottom:12px;display:none;"></div>
    <form id="register-form" onsubmit="return false;">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" required placeholder="John Doe">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required placeholder="Min 6 characters" minlength="6">
      </div>
      <button type="button" id="register-btn" class="btn btn-primary btn-block btn-lg">Create Account</button>
    </form>
    <p style="text-align:center;margin-top:16px;color:var(--text-muted);">
      Already have an account? <a href="login.html" style="color:var(--accent-blue);">Login</a>
    </p>
  </div>

  <script>
    const SUPABASE_URL = 'https://rfogomnbicceentrhymy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmb2dvbW5iaWNjZWVudHJoeW15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDQwOTEsImV4cCI6MjA5NTgyMDA5MX0.wke5a7GEdU2oepfKfSD-rthLTEmpk3GqVfFRM_MjZ9c';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('register-btn').addEventListener('click', async () => {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('register-btn');
      const errorMsg = document.getElementById('error-msg');
      const successMsg = document.getElementById('success-msg');
      
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      
      if (!name || !email || !password) {
        errorMsg.textContent = 'Please fill all fields';
        errorMsg.style.display = 'block';
        return;
      }
      
      btn.disabled = true;
      btn.textContent = 'Creating...';
      
      const { data, error } = await supabase.auth.signUp({
        email, password,
        options: { data: { full_name: name } }
      });
      
      if (error) {
        errorMsg.textContent = error.message;
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      } else {
        successMsg.textContent = 'Account created! Redirecting...';
        successMsg.style.display = 'block';
        setTimeout(() => window.location.href = 'dashboard.html', 1500);
      }
    });
  </script>
</body>
</html>
