<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile – Ascenda Groups</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- NAVBAR (exactly as provided before, with mobile classes) -->
  <nav class="navbar">...</nav>
  <div class="mobile-nav" id="mobileNav">...</div>

  <div style="max-width:600px; margin:40px auto; padding:0 20px;">
    <img id="avatar" src="https://via.placeholder.com/120" style="width:120px;height:120px;border-radius:50%;object-fit:cover;cursor:pointer;" onclick="document.getElementById('avatarInput').click()">
    <input type="file" id="avatarInput" accept="image/*" onchange="uploadAvatar(this)" style="display:none;">
    <h2 id="name"></h2>
    <p id="bio"></p>
    <div id="social"></div>
    <button onclick="openEdit()">Edit Profile</button>

    <div id="editModal" style="display:none; background:var(--card); padding:20px; border-radius:16px; margin-top:20px;">
      <input id="editName" placeholder="Name">
      <textarea id="editBio" placeholder="Bio"></textarea>
      <input id="editInstagram" placeholder="Instagram URL">
      <input id="editTiktok" placeholder="TikTok URL">
      <input id="editTelegram" placeholder="Telegram URL">
      <button onclick="saveProfile()">Save</button>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script>
    // Profile logic (upload avatar, save profile)
    // Full working code as in previous profile page, but with mobile nav fix
  </script>
  <script src="script.js"></script>
</body>
</html>
