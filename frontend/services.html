  <!-- ========== SCRIPTS ========== -->
  <script src="supabase.js"></script>
  <script src="script.js"></script>
  <script>
    // Override the loadServices function to prevent double loading / reloads
    window.originalLoadServices = window.loadServices || function(){};
    window.loadServices = async function() {
      // Only run once
      if (window.servicesLoaded) return;
      window.servicesLoaded = true;

      const container = document.getElementById('services-list');
      if (!container) return;

      try {
        const sb = window.supabaseClient || supabase.createClient(
          window.SUPABASE_URL,
          window.SUPABASE_ANON_KEY,
          { auth: { persistSession: true } }
        );
        const { data, error } = await sb
          .from('services')
          .select('*, departments(name)')
          .eq('is_active', true)
          .order('created_at', { ascending: false });

        if (error) throw error;

        if (!data || data.length === 0) {
          container.innerHTML = '<p style="text-align:center;color:var(--text-muted);">No services available yet.</p>';
          return;
        }

        container.innerHTML = data.map(s => `
          <div class="card">
            <span class="badge badge-purple">Service</span>
            <h3>${s.title}</h3>
            <p>${(s.description || '').substring(0, 100)}</p>
            ${s.price ? `<p style="color:var(--green);font-weight:700;">${s.price}</p>` : ''}
            ${s.departments?.name ? `<span style="font-size:0.75rem;color:var(--purple);">${s.departments.name}</span>` : ''}
          </div>
        `).join('');
      } catch (err) {
        container.innerHTML = `<p style="color:red;">Error: ${err.message}</p>`;
      }
    };

    // Manually trigger the loader after a tiny delay to let the DOM settle
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        // The main script may have already called loadServices, but we override it and call it now
        if (typeof loadServices === 'function') loadServices();
      }, 100);
    });
  </script>
