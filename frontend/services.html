  <!-- ========== SERVICES CONTENT ========== -->

  </footer>

  <!-- ========== SCRIPTS ========== -->
  <script src="supabase.js"></script>
  <script src="script.js"></script>
  <script>
    // Fallback: if script.js failed, load services directly
    window.addEventListener('load', function() {
      setTimeout(function() {
        const list = document.getElementById('services-list');
        // Only run if still showing "Loading..."
        if (list && list.children.length === 1 && list.children[0].textContent.includes('Loading')) {
          console.log('Fallback loading services...');
          const sb = window.supabaseClient || supabase.createClient(
            'https://rfogomnbicceentrhymy.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmb2dvbW5iaWNjZWVudHJoeW15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDQwOTEsImV4cCI6MjA5NTgyMDA5MX0.wke5a7GEdU2oepfKfSD-rthLTEmpk3GqVfFRM_MjZ9c',
            { auth: { persistSession: true } }
          );
          sb.from('services').select('*, departments(name)').eq('is_active', true).order('created_at', { ascending: false })
            .then(({ data, error }) => {
              if (error) {
                list.innerHTML = `<p style="color:red;">Error: ${error.message}</p>`;
                return;
              }
              if (!data || data.length === 0) {
                list.innerHTML = '<p style="text-align:center;color:var(--text-muted);">No services available yet. Add from admin panel.</p>';
                return;
              }
              list.innerHTML = data.map(s => `
                <div class="card">
                  <span class="badge badge-purple">Service</span>
                  <h3>${s.title}</h3>
                  <p>${(s.description||'').substring(0,100)}</p>
                  ${s.price ? `<p style="color:var(--green);font-weight:700;">${s.price}</p>` : ''}
                  ${s.departments?.name ? `<span style="font-size:0.75rem;color:var(--purple);">${s.departments.name}</span>` : ''}
                </div>
              `).join('');
            });
        }
      }, 1500);
    });
  </script>
</body>
